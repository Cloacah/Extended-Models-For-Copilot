<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <rect width="960" height="360" fill="#1e1e1e"/>
  <text x="48" y="58" fill="#ffffff" font-family="Segoe UI, Arial" font-size="28" font-weight="700">Vision Proxy Flow</text>
  <rect x="58" y="116" width="190" height="92" rx="10" fill="#2d2d30" stroke="#454545"/>
  <text x="92" y="153" fill="#d4d4d4" font-family="Segoe UI, Arial" font-size="18">User message</text>
  <text x="86" y="181" fill="#9cdcfe" font-family="Segoe UI, Arial" font-size="15">text + image</text>
  <path d="M255 162 H350" stroke="#9cdcfe" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="360" y="100" width="238" height="124" rx="10" fill="#2d2d30" stroke="#454545"/>
  <text x="394" y="142" fill="#d4d4d4" font-family="Segoe UI, Arial" font-size="18">Vision model</text>
  <text x="394" y="172" fill="#9cdcfe" font-family="Segoe UI, Arial" font-size="15">built-in Copilot or custom</text>
  <text x="394" y="198" fill="#ce9178" font-family="Segoe UI, Arial" font-size="15">returns image description</text>
  <path d="M608 162 H704" stroke="#9cdcfe" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="714" y="116" width="190" height="92" rx="10" fill="#2d2d30" stroke="#454545"/>
  <text x="744" y="153" fill="#d4d4d4" font-family="Segoe UI, Arial" font-size="18">Current model</text>
  <text x="742" y="181" fill="#9cdcfe" font-family="Segoe UI, Arial" font-size="15">text-only context</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9cdcfe"/>
    </marker>
  </defs>
</svg>
